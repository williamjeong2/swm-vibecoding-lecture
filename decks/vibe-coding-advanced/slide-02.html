<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이 강의가 다루는 문제</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      overflow: hidden;
      font-family: 'Pretendard', sans-serif;
      background: #101114;
      color: #FAFAFA;
      padding: 24pt 32pt 22pt;
      position: relative;
    }
    .slide {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 18pt;
    }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: start;
    }
    .kicker,
    .footer p,
    .level p:first-child {
      font-family: 'Space Mono', monospace;
    }
    .kicker {
      color: #F97316;
      font-size: 8.5pt;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 8pt;
    }
    h1 {
      max-width: 390pt;
      font-size: 31pt;
      line-height: 1.16;
      letter-spacing: 0;
      font-weight: 880;
      padding-bottom: 3pt;
    }
    .summary {
      width: 214pt;
      color: #D1D5DB;
      font-size: 12.3pt;
      line-height: 1.45;
      font-weight: 650;
      border-left: 3pt solid #F97316;
      padding-left: 12pt;
      margin-top: 8pt;
    }
    .ladder {
      display: grid;
      grid-template-columns: 0.78fr 0.98fr 1.25fr;
      gap: 14pt;
      align-items: end;
      padding-bottom: 16pt;
    }
    .level {
      position: relative;
      border: 1pt solid rgba(255, 255, 255, 0.18);
      padding: 14pt;
      display: grid;
      align-content: start;
      gap: 9pt;
      min-height: 126pt;
      background: #1F2937;
    }
    .level:nth-child(1) { min-height: 134pt; background: #172033; }
    .level:nth-child(2) { min-height: 178pt; background: #1F2638; }
    .level:nth-child(3) { min-height: 234pt; background: #261B13; border-color: #F97316; }
    .level p:first-child {
      color: #9CA3AF;
      font-size: 8pt;
      text-transform: uppercase;
    }
    .level h2 {
      font-size: 21pt;
      line-height: 1.18;
      letter-spacing: 0;
      padding-bottom: 2pt;
    }
    .level p:last-child {
      color: #E5E7EB;
      font-size: 11.2pt;
      line-height: 1.35;
      font-weight: 650;
    }
    .level:nth-child(3) h2,
    .level:nth-child(3) p:first-child {
      color: #FDBA74;
    }
    .marker {
      position: absolute;
      right: 12pt;
      top: 10pt;
      width: 8pt;
      height: 8pt;
      background: #F97316;
    }
    .footer {
      position: absolute;
      left: 32pt;
      right: 32pt;
      bottom: 14pt;
      display: flex;
      justify-content: space-between;
      color: #9CA3AF;
      font-size: 7.5pt;
    }
  </style>
</head>
<body>
  <main class="slide">
    <section class="topline">
      <div>
        <p class="kicker">Why Advanced / 02</p>
        <h1>이 강의가 다루는 문제</h1>
      </div>
      <p class="summary">좋은 결과는 프롬프트 한 줄보다, 매번 비슷하게 잘 굴러가는 환경에서 나옵니다.</p>
    </section>
    <section class="ladder">
      <article class="level">
        <div class="marker"></div>
        <p>level 1</p>
        <h2>초급</h2>
        <p>AI에게 일을 시켜본다.</p>
      </article>
      <article class="level">
        <div class="marker"></div>
        <p>level 2</p>
        <h2>중급</h2>
        <p>산출물을 보고 직접 고친다.</p>
      </article>
      <article class="level">
        <div class="marker"></div>
        <p>level 3</p>
        <h2>고급</h2>
        <p>누가 뭘 할지, 어디까지 맡길지, 어떻게 확인할지를 정합니다.</p>
      </article>
    </section>
  </main>
  <footer class="footer">
    <p>SW Maestro Lecture</p>
    <p>02 / 54</p>
  </footer>
</body>
</html>
