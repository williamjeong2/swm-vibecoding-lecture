<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECC Skills와 Rules</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      overflow: hidden;
      font-family: 'Pretendard', sans-serif;
      background: #FAFAFA;
      color: #171717;
      padding: 24pt 32pt;
      position: relative;
    }
    .slide {
      height: 100%;
      display: grid;
      grid-template-columns: 0.96fr 1fr;
      gap: 21pt;
      align-items: center;
    }
    .kicker,
    .footer p,
    .note p:first-child,
    .versus p {
      font-family: 'Space Mono', monospace;
    }
    .left {
      display: grid;
      gap: 14pt;
    }
    .kicker {
      color: #BE123C;
      font-size: 8.5pt;
      font-weight: 700;
      text-transform: uppercase;
    }
    h1 {
      font-size: 31pt;
      line-height: 1.16;
      letter-spacing: 0;
      font-weight: 880;
      padding-bottom: 3pt;
    }
    .message {
      color: #525252;
      font-size: 12.6pt;
      line-height: 1.42;
      font-weight: 650;
      max-width: 260pt;
    }
    .notes {
      position: relative;
      min-height: 286pt;
    }
    .note {
      position: absolute;
      width: 176pt;
      border: 1.4pt solid #171717;
      background: #FFFFFF;
      padding: 13pt;
      box-shadow: 5pt 5pt 0 #171717;
    }
    .note.skills {
      left: 0;
      top: 4pt;
      background: #FFE4E6;
    }
    .note.rules {
      right: 0;
      bottom: 4pt;
      background: #E0F2FE;
    }
    .note p:first-child {
      color: #737373;
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 7pt;
    }
    .note h2 {
      font-size: 23pt;
      line-height: 1.16;
      letter-spacing: 0;
      margin-bottom: 9pt;
      padding-bottom: 2pt;
    }
    .note ul {
      list-style: none;
      display: grid;
      gap: 6pt;
    }
    .note li {
      color: #262626;
      font-size: 9.5pt;
      line-height: 1.28;
      font-weight: 700;
      border-top: 1pt solid rgba(23, 23, 23, 0.25);
      padding-top: 5pt;
    }
    .versus {
      position: absolute;
      left: 139pt;
      top: 120pt;
      width: 55pt;
      height: 55pt;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #171717;
      color: #FFFFFF;
      z-index: 3;
    }
    .versus p {
      font-size: 11pt;
      font-weight: 700;
    }
    .footer {
      position: absolute;
      left: 32pt;
      right: 32pt;
      bottom: 12pt;
      display: flex;
      justify-content: space-between;
      color: #737373;
      font-size: 7.5pt;
    }
  </style>
</head>
<body>
  <main class="slide">
    <section class="left">
      <p class="kicker">Skills / Rules / 09</p>
      <h1>ECC Skills와 Rules</h1>
      <p class="message">Skills는 필요할 때 꺼내 쓰는 절차고, Rules는 항상 깔아두는 기준입니다.</p>
    </section>
    <section class="notes">
      <article class="note skills">
        <p>when needed</p>
        <h2>Skills</h2>
        <ul>
          <li>TDD, 보안 리뷰, API 설계, 프론트엔드 패턴</li>
          <li>필요할 때 꺼내 씁니다</li>
          <li>언제 쓰나가 있으면 skill</li>
        </ul>
      </article>
      <div class="versus"><p>VS</p></div>
      <article class="note rules">
        <p>always on</p>
        <h2>Rules</h2>
        <ul>
          <li>코딩 스타일, 테스트 기준, 금지사항</li>
          <li>기본 배경으로 깔아둔다</li>
          <li>항상 지켜라면 rule</li>
        </ul>
      </article>
    </section>
  </main>
  <footer class="footer">
    <p>SW Maestro Lecture</p>
    <p>09 / 54</p>
  </footer>
</body>
</html>
