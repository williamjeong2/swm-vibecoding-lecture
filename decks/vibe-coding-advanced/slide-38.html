<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>UI 라이브러리로 기본 품질을 올리기</title><style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;overflow:hidden;font-family:'Pretendard',sans-serif;background:#F8FAFC;color:#0F172A;padding:28pt 34pt;position:relative}
p,h1,h2,h3,h4,li{letter-spacing:0}
.mono{font-family:'Space Mono',monospace}
.kicker{font-family:'Space Mono',monospace;font-size:8pt;font-weight:700;color:#4F46E5;text-transform:uppercase;margin-bottom:9pt}
h1{font-size:27pt;line-height:1.12;font-weight:900;padding-bottom:3pt;margin-bottom:9pt}
h2{font-size:15pt;line-height:1.18;font-weight:850;padding-bottom:2pt}
h3{font-size:10.5pt;line-height:1.22;font-weight:850;padding-bottom:1pt}
.lead{font-size:12.2pt;line-height:1.42;font-weight:650;color:#475569;max-width:320pt}
.footer{position:absolute;left:34pt;right:34pt;bottom:14pt;display:flex;justify-content:space-between;color:#64748B;font-family:'Space Mono',monospace;font-size:7pt}
.tag{display:inline-block;border:1.2pt solid #CBD5E1;padding:4pt 7pt;font-family:'Space Mono',monospace;font-size:7.5pt;color:#475569;background:#FFFFFF}
.card{border:1.4pt solid #CBD5E1;background:#FFFFFF;padding:11pt}
.soft{background:#EEF2FF;border:1pt solid #CBD5E1}

main{height:100%;display:grid;grid-template-rows:auto 1fr;gap:18pt}.shelf{display:grid;grid-template-columns:repeat(3,1fr);gap:14pt}.lib{background:#fff;border:1.4pt solid #CBD5E1;padding:15pt;min-height:220pt}.lib h2{font-size:18pt;margin-bottom:14pt}.lib p{font-size:10pt;line-height:1.5;color:#475569;margin-bottom:8pt}.cmd{background:#0F172A;color:#E2E8F0;padding:8pt}.cmd p{font-family:'Space Mono',monospace;font-size:8.5pt;color:#E2E8F0}
</style></head><body><main><section><p class="kicker">Libraries / 38</p><h1>검증된 컴포넌트를 선택지로 줍니다</h1><p class="lead">예쁘게보다 무엇을 써서가 더 정확하다.</p></section><section class="shelf"><article class="lib"><h2>shadcn</h2><p>어드민, 대시보드, 버튼, 테이블, 폼, 모달.</p><div class="cmd"><p>shadcn으로 어드민</p></div></article><article class="lib"><h2>Aceternity</h2><p>랜딩페이지, 히어로, 부드러운 인터랙션.</p><div class="cmd"><p>Aceternity UI로 랜딩</p></div></article><article class="lib"><h2>React Bits</h2><p>텍스트 효과, 버튼 호버, 스크롤 트리거.</p><div class="cmd"><p>컴포넌트 이름 지정</p></div></article></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>38 / 54</p></footer></body></html>
