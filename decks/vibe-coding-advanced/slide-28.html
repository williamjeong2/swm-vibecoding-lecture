<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Superpowers 베스트 프랙티스</title><style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;overflow:hidden;font-family:'Pretendard',sans-serif;background:#F7F2E8;color:#171717;padding:28pt 34pt;position:relative}
p,h1,h2,h3,h4,li{letter-spacing:0}
.mono{font-family:'Space Mono',monospace}
.kicker{font-family:'Space Mono',monospace;font-size:8pt;font-weight:700;color:#E4572E;text-transform:uppercase;margin-bottom:9pt}
h1{font-size:27pt;line-height:1.12;font-weight:900;padding-bottom:3pt;margin-bottom:9pt}
h2{font-size:15pt;line-height:1.18;font-weight:850;padding-bottom:2pt}
h3{font-size:10.5pt;line-height:1.22;font-weight:850;padding-bottom:1pt}
.lead{font-size:12.2pt;line-height:1.42;font-weight:650;color:#4F4A43;max-width:320pt}
.footer{position:absolute;left:34pt;right:34pt;bottom:14pt;display:flex;justify-content:space-between;color:#6F685E;font-family:'Space Mono',monospace;font-size:7pt}
.tag{display:inline-block;border:1.2pt solid #171717;padding:4pt 7pt;font-family:'Space Mono',monospace;font-size:7.5pt;color:#4F4A43;background:#FFFFFF}
.card{border:1.4pt solid #171717;background:#FFFFFF;padding:11pt}
.soft{background:#FFF7D8;border:1pt solid #171717}

main{height:100%;display:grid;grid-template-columns:280pt 1fr;gap:24pt;align-items:center}.stamp{font-size:30pt;line-height:1.2;height:54pt;font-weight:950;color:#171717;margin-top:10pt}.tickets{display:grid;gap:9pt}.ticket{display:grid;grid-template-columns:42pt 1fr;gap:9pt;align-items:center;border:1.5pt solid #171717;background:#fff;padding:10pt;box-shadow:4pt 4pt 0 #E4572E}.ticket p{font-size:9.4pt;line-height:1.32;color:#4F4A43}.ticket h3{font-size:11pt}.num{font-family:'Space Mono',monospace;color:#E4572E;font-weight:700}
</style></head><body><main><section><p class="kicker">Practice / 28</p><h1>Superpowers는<br>자동화보다 규율입니다</h1><p class="lead">작업 전후의 체크포인트를 강제해서 결과가 덜 흔들리게 만듭니다.</p><p class="stamp">RULES FIRST</p></section><section class="tickets"><article class="ticket"><p class="num">01</p><div><h3>짧은 설계 먼저</h3><p>간단한 작업이라도 의도와 경계를 확인합니다.</p></div></article><article class="ticket"><p class="num">02</p><div><h3>작은 배치</h3><p>계획은 확인 가능한 단위로 쪼갭니다.</p></div></article><article class="ticket"><p class="num">03</p><div><h3>원인 조사 후 수정</h3><p>디버깅은 가설 확인부터 시작합니다.</p></div></article><article class="ticket"><p class="num">04</p><div><h3>세 번 실패하면 재검토</h3><p>코드가 아니라 가정이 틀렸을 수 있다.</p></div></article></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>28 / 54</p></footer></body></html>
