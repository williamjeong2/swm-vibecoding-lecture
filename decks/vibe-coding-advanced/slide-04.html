<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도구 숙련과 운영 능력은 다르다</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      overflow: hidden;
      font-family: 'Pretendard', sans-serif;
      background: #F1F5F9;
      color: #0F172A;
      padding: 25pt 32pt;
      position: relative;
    }
    .slide {
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 70pt 1fr;
      gap: 18pt;
      align-items: center;
    }
    .kicker,
    .footer p,
    .side p:first-child,
    .bridge p {
      font-family: 'Space Mono', monospace;
    }
    .side {
      min-height: 300pt;
      border: 1.4pt solid #CBD5E1;
      background: #FFFFFF;
      padding: 22pt;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12pt;
    }
    .side:first-child {
      box-shadow: -7pt 7pt 0 #94A3B8;
    }
    .side:last-child {
      border-color: #00A676;
      box-shadow: 7pt 7pt 0 #00A676;
    }
    .side p:first-child {
      color: #64748B;
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
    }
    .side:last-child p:first-child {
      color: #008060;
    }
    h1 {
      font-size: 26pt;
      line-height: 1.16;
      letter-spacing: 0;
      font-weight: 880;
      padding-bottom: 3pt;
    }
    .side ul {
      list-style: none;
      display: grid;
      gap: 11pt;
      align-content: end;
    }
    .side li {
      color: #334155;
      font-size: 11.8pt;
      line-height: 1.34;
      font-weight: 700;
      border-top: 1pt solid #E2E8F0;
      padding-top: 9pt;
    }
    .bridge {
      height: 300pt;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 10pt;
    }
    .bridge p {
      color: #475569;
      font-size: 8pt;
      font-weight: 700;
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }
    .bridge div {
      width: 48pt;
      height: 48pt;
      border-radius: 50%;
      background: #0F172A;
      position: relative;
    }
    .bridge div::after {
      content: "";
      position: absolute;
      right: -26pt;
      top: 17pt;
      border-top: 7pt solid transparent;
      border-bottom: 7pt solid transparent;
      border-left: 28pt solid #0F172A;
    }
    .message {
      position: absolute;
      left: 32pt;
      right: 32pt;
      top: 22pt;
      display: flex;
      justify-content: space-between;
      align-items: start;
    }
    .kicker {
      color: #008060;
      font-size: 8.5pt;
      font-weight: 700;
      text-transform: uppercase;
    }
    .message h2 {
      max-width: 330pt;
      text-align: right;
      color: #334155;
      font-size: 12pt;
      line-height: 1.4;
      letter-spacing: 0;
      font-weight: 700;
    }
    .footer {
      position: absolute;
      left: 32pt;
      right: 32pt;
      bottom: 13pt;
      display: flex;
      justify-content: space-between;
      color: #64748B;
      font-size: 7.5pt;
    }
  </style>
</head>
<body>
  <div class="message">
    <p class="kicker">AI Native / 04</p>
    <h2>도구를 잘 쓰는 것과 AI Native Engineer가 되는 것은 같은 일이 아니다.</h2>
  </div>
  <main class="slide">
    <section class="side">
      <p>tool skill</p>
      <h1>도구 숙련은 시작점입니다</h1>
      <ul>
        <li>원리 없는 감각은 추측에 머문다.</li>
        <li>좋은 답변을 우연히 얻는 상태다.</li>
      </ul>
    </section>
    <section class="bridge">
      <p>gap</p>
      <div></div>
    </section>
    <section class="side">
      <p>operating skill</p>
      <h1>운영 실력은 구조에서 보입니다</h1>
      <ul>
        <li>문제를 어떻게 잡고, 어떻게 확인하고, 어떻게 굴릴지를 정합니다.</li>
        <li>감각 없는 원리는 학문에 머문다.</li>
      </ul>
    </section>
  </main>
  <footer class="footer">
    <p>SW Maestro Lecture</p>
    <p>04 / 54</p>
  </footer>
</body>
</html>
