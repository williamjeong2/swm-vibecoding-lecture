<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Eval Scorecard</title><style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;overflow:hidden;font-family:'Pretendard',sans-serif;position:relative}
p,h1,h2,h3,h4,li{letter-spacing:0}
.mono{font-family:'Space Mono',monospace}
.footer{position:absolute;left:34pt;right:34pt;bottom:14pt;display:flex;justify-content:space-between;font-family:'Space Mono',monospace;font-size:7pt}
.kicker{font-family:'Space Mono',monospace;font-size:8pt;font-weight:700;text-transform:uppercase;margin-bottom:9pt}
h1{font-size:30pt;line-height:1.12;font-weight:900;padding-bottom:3pt;margin-bottom:10pt}
h2{font-size:14pt;line-height:1.2;font-weight:850;padding-bottom:2pt}
h3{font-size:10.5pt;line-height:1.25;font-weight:850;padding-bottom:1pt}
.lead{font-size:12pt;line-height:1.45;font-weight:650}

body{background:#111827;color:#F9FAFB;padding:28pt 34pt}.footer{color:#94A3B8}.kicker{color:#7DD3FC}main{height:100%;display:grid;grid-template-columns:250pt 1fr;gap:24pt;align-items:center}.score{background:#172033;border:1pt solid #334155;padding:14pt}.metric{display:grid;grid-template-columns:130pt 1fr 50pt;gap:10pt;align-items:center;border-bottom:1pt solid #334155;padding:8pt 0}.metric:last-child{border-bottom:none}.metric p{font-size:9pt;color:#CBD5E1}.bar{height:8pt;background:#0F172A}.bar i{display:block;height:100%;background:#7DD3FC}.pass{color:#86EFAC!important;font-weight:800}.warn{color:#FDE68A!important;font-weight:800}.fail{color:#FDA4AF!important;font-weight:800}
</style></head><body><main><section><p class="kicker">Eval / 48</p><h1>자동 commit 전에 점수판부터 만듭니다</h1><p class="lead">“좋아 보임”은 판정 기준이 아닙니다. 무엇을 넘으면 commit이고, 무엇을 못 넘으면 revert인지 먼저 정합니다.</p></section><section class="score"><article class="metric"><p>Build / Test</p><div class="bar"><i style="width:100%"></i></div><p class="pass">pass</p></article><article class="metric"><p>Spec compliance</p><div class="bar"><i style="width:92%"></i></div><p class="pass">4.6</p></article><article class="metric"><p>UI clarity</p><div class="bar"><i style="width:78%"></i></div><p class="warn">3.9</p></article><article class="metric"><p>Regression risk</p><div class="bar"><i style="width:30%"></i></div><p class="pass">low</p></article><article class="metric"><p>Decision</p><div class="bar"><i style="width:66%"></i></div><p class="warn">retry</p></article></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>48 / 54</p></footer></body></html>
