<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superpowers와 TDD</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      overflow: hidden;
      font-family: 'Pretendard', sans-serif;
      color: #221B18;
      background: #FFF8F0;
      padding: 24pt 30pt 22pt;
    }
    .slide {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 12pt;
    }
    .topline, .footer {
      display: flex;
      justify-content: space-between;
      color: #7A6760;
      font-family: 'Space Mono', monospace;
      font-size: 7.4pt;
      text-transform: uppercase;
    }
    .layout {
      position: relative;
      min-height: 0;
      display: grid;
      grid-template-columns: 230pt 1fr;
      gap: 22pt;
      align-items: center;
    }
    .title {
      border-top: 4pt solid #E5484D;
      padding-top: 14pt;
    }
    .kicker {
      font-family: 'Space Mono', monospace;
      color: #E5484D;
      font-size: 8pt;
      margin-bottom: 10pt;
      text-transform: uppercase;
    }
    h2 {
      font-size: 29pt;
      line-height: 1.14;
      letter-spacing: 0;
      margin-bottom: 12pt;
      padding-bottom: 3pt;
    }
    .message {
      font-size: 12pt;
      line-height: 1.44;
      font-weight: 680;
      color: #51433D;
    }
    .loop {
      position: relative;
      height: 270pt;
    }
    .center {
      position: absolute;
      left: 120pt;
      top: 93pt;
      width: 112pt;
      height: 84pt;
      border: 1.5pt solid #221B18;
      background: #221B18;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12pt;
    }
    .center p {
      color: #FFF8F0;
      font-size: 11pt;
      line-height: 1.28;
      font-weight: 800;
      text-align: center;
    }
    .node {
      position: absolute;
      width: 150pt;
      min-height: 74pt;
      border: 1.5pt solid #221B18;
      background: #FFFFFF;
      padding: 10pt;
      box-shadow: 5pt 5pt 0 #221B18;
    }
    .node h3 {
      font-size: 15pt;
      margin-bottom: 5pt;
    }
    .node p {
      font-size: 9.2pt;
      line-height: 1.3;
      color: #51433D;
    }
    .red { left: 6pt; top: 0; background: #FFE5E6; }
    .green { right: 6pt; top: 88pt; background: #E7F8EF; }
    .refactor { left: 42pt; bottom: 0; background: #E7F0FF; }
    .note {
      position: absolute;
      right: 0;
      bottom: 4pt;
      width: 128pt;
      border-left: 3pt solid #E5484D;
      padding: 7pt 9pt;
      background: #FFFFFF;
    }
    .note h3 {
      font-size: 9.5pt;
      margin-bottom: 4pt;
    }
    .note p {
      color: #51433D;
      font-size: 8.6pt;
      line-height: 1.28;
    }
  </style>
</head>
<body>
  <main class="slide">
    <div class="topline">
      <p>VIBE CODING ADVANCED</p>
      <p>TDD</p>
    </div>
    <section class="layout">
      <article class="title">
        <p class="kicker">TDD / 27</p>
        <h2>먼저 실패를 확인합니다</h2>
        <p class="message">Superpowers의 TDD는 테스트를 쓰자는 조언이 아니라, 만들기 전에 실패를 먼저 증명하라는 규칙입니다.</p>
      </article>
      <section class="loop">
        <article class="node red">
          <h3>RED</h3>
          <p>실패하는 테스트를 작성하고 실제 실패를 본다.</p>
        </article>
        <article class="node green">
          <h3>GREEN</h3>
          <p>가장 작은 구현으로 일단 통과만 만듭니다.</p>
        </article>
        <article class="node refactor">
          <h3>REFACTOR</h3>
          <p>통과 상태를 유지하면서 구조를 다듬습니다.</p>
        </article>
        <div class="center">
          <p>테스트 없이 먼저 만든 코드는 버립니다</p>
        </div>
        <article class="note">
          <h3>잘 맞는 작업</h3>
          <p>기능 추가, 버그 재현, 회귀 방지</p>
        </article>
      </section>
    </section>
    <div class="footer">
      <p>SW Maestro Lecture</p>
      <p>27 / 54</p>
    </div>
  </main>
</body>
</html>
