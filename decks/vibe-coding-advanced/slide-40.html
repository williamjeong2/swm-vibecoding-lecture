<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Taste Skill 설정으로 디자인 방향 잡기</title><style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;overflow:hidden;font-family:'Pretendard',sans-serif;background:#111827;color:#F9FAFB;padding:28pt 34pt;position:relative}
p,h1,h2,h3,h4,li{letter-spacing:0}
.mono{font-family:'Space Mono',monospace}
.kicker{font-family:'Space Mono',monospace;font-size:8pt;font-weight:700;color:#7DD3FC;text-transform:uppercase;margin-bottom:9pt}
h1{font-size:27pt;line-height:1.12;font-weight:900;padding-bottom:3pt;margin-bottom:9pt}
h2{font-size:15pt;line-height:1.18;font-weight:850;padding-bottom:2pt}
h3{font-size:10.5pt;line-height:1.22;font-weight:850;padding-bottom:1pt}
.lead{font-size:12.2pt;line-height:1.42;font-weight:650;color:#CBD5E1;max-width:320pt}
.footer{position:absolute;left:34pt;right:34pt;bottom:14pt;display:flex;justify-content:space-between;color:#94A3B8;font-family:'Space Mono',monospace;font-size:7pt}
.tag{display:inline-block;border:1.2pt solid #334155;padding:4pt 7pt;font-family:'Space Mono',monospace;font-size:7.5pt;color:#CBD5E1;background:#172033}
.card{border:1.4pt solid #334155;background:#172033;padding:11pt}
.soft{background:#0F172A;border:1pt solid #334155}

main{height:100%;display:grid;grid-template-columns:250pt 1fr;gap:22pt;align-items:center}.dials{display:grid;grid-template-columns:repeat(3,1fr);gap:9pt}.dial{height:220pt;border:1pt solid #334155;background:#172033;padding:10pt;display:grid;align-content:end;position:relative}.bar{position:absolute;left:18pt;right:18pt;bottom:74pt;background:#0F172A;border:1pt solid #334155;height:92pt}.bar p{position:absolute;bottom:0;left:0;right:0;background:#7DD3FC;color:#0F172A;text-align:center;font-family:'Space Mono',monospace;font-size:8pt;font-weight:700}.v1 .bar p{height:80%}.v2 .bar p{height:65%}.v3 .bar p{height:25%}.dial h2{font-size:8.7pt;color:#F9FAFB;margin-bottom:5pt}.dial>p{font-size:7.8pt;color:#CBD5E1;line-height:1.28}
</style></head><body><main><section><p class="kicker">Taste Skill / 40</p><h1>추상적인 취향을<br>조절값으로 바꾼다</h1><p class="lead">숫자 세 개만 바꿔도 같은 프로젝트가 완전히 다른 느낌이 됩니다.</p></section><section class="dials"><article class="dial v1"><div class="bar"><p>8</p></div><h2>DESIGN_VARIANCE</h2><p>레이아웃이 얼마나 실험적인지</p></article><article class="dial v2"><div class="bar"><p>7</p></div><h2>MOTION_INTENSITY</h2><p>애니메이션 강도</p></article><article class="dial v3"><div class="bar"><p>2</p></div><h2>VISUAL_DENSITY</h2><p>한 화면에 얼마나 담을지</p></article></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>40 / 54</p></footer></body></html>
