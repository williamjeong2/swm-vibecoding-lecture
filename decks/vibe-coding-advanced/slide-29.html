<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>OpenSpec 개요</title><style>

*{margin:0;padding:0;box-sizing:border-box}
body{width:720pt;height:405pt;overflow:hidden;font-family:'Pretendard',sans-serif;background:#111827;color:#F9FAFB;padding:28pt 34pt;position:relative}
p,h1,h2,h3,h4,li{letter-spacing:0}
.mono{font-family:'Space Mono',monospace}
.kicker{font-family:'Space Mono',monospace;font-size:8pt;font-weight:700;color:#7DD3FC;text-transform:uppercase;margin-bottom:9pt}
h1{font-size:27pt;line-height:1.12;font-weight:900;padding-bottom:3pt;margin-bottom:9pt}
h2{font-size:15pt;line-height:1.18;font-weight:850;padding-bottom:2pt}
h3{font-size:10.5pt;line-height:1.22;font-weight:850;padding-bottom:1pt}
.lead{font-size:12.2pt;line-height:1.42;font-weight:650;color:#CBD5E1;max-width:320pt}

</style></head><body><main><section><p class="kicker">OpenSpec / 29</p><h1>추측해서 코딩하지<br>않게 해주는 사양 장치</h1><p class="lead">변경 의도와 요구사항을 코드 옆에 남기면, 에이전트와 사람이 같은 기준을 보게 됩니다.</p></section><section class="tree"><h2>openspec/</h2><div class="path"><p>specs/ 현재 기준 행동</p><p>changes/ 진행 중인 변경</p><p>proposal.md 왜 하는가</p><p>design.md 기술 판단</p><p>tasks.md 구현 체크리스트</p></div></section><section class="doc"><article><h3>main spec</h3><p>현재 시스템이 지켜야 할 기준 상태.</p></article><article><h3>delta spec</h3><p>이번 변경이 추가·수정·삭제하는 요구사항.</p></article></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>29 / 54</p></footer></body></html>
