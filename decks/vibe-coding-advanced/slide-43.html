<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>좋은 질문은 Y가 아니라 X를 묻는다</title><style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css');

h1{font-size:27pt;line-height:1.12;font-weight:900;padding-bottom:3pt;margin-bottom:9pt}

.lead{font-size:12.2pt;line-height:1.42;font-weight:650;color:#475569;max-width:320pt}

main{height:100%;display:grid;grid-template-columns:1fr 1fr;gap:20pt;align-items:center}.chat{display:grid;gap:10pt}.bubble{background:#F8FAFC;border:1.3pt solid #334155;padding:12pt}.bubble h2{font-size:12pt;margin-bottom:6pt}.bubble p{font-size:9.8pt;line-height:1.4;color:#475569}.bad{box-shadow:5pt 5pt 0 #94A3B8}.good{box-shadow:5pt 5pt 0 #0F172A}.xy{display:grid;grid-template-columns:1fr 1fr;gap:10pt}.xy article{padding:14pt;background:#0F172A;color:#fff}.xy h2{font-size:30pt}.xy p{font-size:10pt;line-height:1.4;color:#CBD5E1}
</style></head><body><main><section><p class="kicker">X/Y Problem / 43</p><h1>좋은 질문은 Y가 아니라<br>X를 묻는다</h1><p class="lead">에이전트는 Y를 빠르게 만들어버릴 수 있어서, 시작 전에 문제의 층위를 낮춰봐야 합니다.</p><section class="xy"><article><h2>X</h2><p>진짜 해결하려는 문제</p></article><article><h2>Y</h2><p>X를 해결한다고 믿는 특정 방법</p></article></section></section><section class="chat"><article class="bubble bad" style="box-shadow:3pt 3pt 0 #94A3B8"><h2>Y 질문</h2><p>인덱스 뭐 걸까요?</p><p>버튼 색 뭐가 좋을까요?</p></article><article class="bubble good" style="box-shadow:3pt 3pt 0 #0F172A"><h2>X 질문</h2><p>이 쿼리가 느린 원인이 뭘까요?</p><p>가입 전환의 병목이 어디일까요?</p></article></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>43 / 54</p></footer></body></html>
