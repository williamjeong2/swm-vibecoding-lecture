</style></head><body><main><section><p class="kicker">Design / 37</p><h1>기능은 되는데<br>AI 티가 난다</h1><p class="lead">문제는 기능보다 보는 눈과 기준이 부족할 때 자주 생깁니다.</p></section><section class="panel bad"><p class="label">Before</p><h2>추상 지시</h2><p>예쁘게 만들어줘.</p><p>레이아웃은 무난하고 반복적입니다.</p><p>색상은 안전하지만 개성이 없습니다.</p><p>여백과 모션이 어색합니다.</p></section><section class="panel good"><p class="label">After</p><h2>기준을 공급</h2><p>레퍼런스 3개를 먼저 고른다.</p><p>디자인 시스템을 문서로 준다.</p><p>컴포넌트 라이브러리를 지정합니다.</p><p>visual-verdict로 비교합니다.</p></section></main><footer class="footer"><p>SW Maestro Lecture</p><p>37 / 54</p></footer></body></html>
